<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Три Кота: Hockey UID Edition</title>
    <style>
        :root { --accent: #ff4757; --bg: #0a0a12; --card: #161625; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* ШАПКА С UID */
        .header { background: var(--card); padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #252545; }
        .pfp-wrap { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; position: relative; }
        .pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .user-meta { flex: 1; }
        .uid-tag { font-size: 9px; color: #777; background: #000; padding: 2px 5px; border-radius: 3px; display: inline-block; margin-top: 2px; }
        
        .nav-btn { padding: 6px 12px; background: #252545; border: none; color: white; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; }
        
        /* ТИТУЛЫ */
        .t-gold { background: linear-gradient(90deg, #ffd700, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200%; animation: shine 2s infinite linear; }
        .t-pearl { background: linear-gradient(45deg, #fff, #e6d3f9, #c8f4f9, #f9d3e3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s infinite linear; font-weight: 900; }
        @keyframes shine { to { background-position: 200% center; } }

        /* ОКНО ТИТУЛОВ */
        #titles-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; padding: 20px; text-align: center; }
        .titles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .title-card { background: #1f1f35; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .locked { opacity: 0.3; filter: grayscale(1); }

        /* ИГРА */
        .main-game { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        canvas { background: #fff; border-radius: 10px; width: 92vw; height: auto; box-shadow: 0 0 20px rgba(255, 71, 87, 0.2); }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; border-radius: 10px; }
        
        #score { font-size: 32px; font-weight: 900; margin-bottom: 10px; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="pfp-wrap" onclick="document.getElementById('f').click()">
            <img src="https://i.imgur.com" id="pfp">
        </div>
        <input type="file" id="f" hidden accept="image/*">
        
        <div class="user-meta">
            <div id="nDisplay" style="font-size: 14px; font-weight: bold;">Три_Кота_Про</div>
            <div id="activeTitle" style="font-size: 10px;">Новичок</div>
            <div class="uid-tag">ID: <span id="uidDisplay">######</span></div>
        </div>

        <div style="text-align: right;">
            <div id="eloDisp" style="color: #44ffaa; font-weight: bold; font-size: 20px;">1000</div>
            <button class="nav-btn" onclick="openTitles()" style="margin-top: 5px;">🏆 ТИТУЛЫ</button>
        </div>
    </div>

    <div id="titles-screen">
        <h2 style="color: var(--accent);">Гардероб Титулов</h2>
        <div class="titles-grid" id="titlesGrid"></div>
        <button class="nav-btn" style="margin-top: 30px; padding: 10px 40px;" onclick="closeTitles()">НАЗАД</button>
    </div>

    <div class="main-game">
        <div id="score">0 : 0</div>
        <canvas id="arena" width="500" height="300"></canvas>
        <div id="menu">
            <h2 id="mMsg">ГОТОВ К МАТЧУ?</h2>
            <button class="nav-btn" style="padding: 15px 40px; font-size: 18px; background: var(--accent);" onclick="startMatch()">ИГРАТЬ</button>
            <p style="font-size: 10px; color: #666; margin-top: 15px;">Управление: Пальцем или мышкой</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('arena');
    const ctx = canvas.getContext('2d');
    
    const ALL_TITLES = [
        { id: 0, name: "Новичок", class: "", req: 0 },
        { id: 1, name: "Золотой Чемпион", class: "t-gold", req: 1100 },
        { id: 2, name: "Перламутровый Бог", class: "t-pearl", req: 1350 }
    ];

    // ГЕНЕРАЦИЯ UID И ЗАГРУЗКА
    let user = JSON.parse(localStorage.getItem('hockey_pro_save')) || {
        elo: 1000, 
        streak: 0, 
        pfp: "https://i.imgur.com", 
        activeTitleId: 0,
        uid: Math.floor(100000 + Math.random() * 900000) // Генерация 6-значного кода
    };

    function save() { localStorage.setItem('hockey_pro_save', JSON.stringify(user)); updateUI(); }

    function updateUI() {
        document.getElementById('eloDisp').innerText = user.elo;
        document.getElementById('pfp').src = user.pfp;
        document.getElementById('uidDisplay').innerText = user.uid;
        const cur = ALL_TITLES.find(t => t.id === user.activeTitleId);
        document.getElementById('activeTitle').innerText = cur.name;
        document.getElementById('activeTitle').className = cur.class;
    }

    // МОБИЛЬНОЕ + ПК УПРАВЛЕНИЕ
    function handleMove(clientY) {
        const rect = canvas.getBoundingClientRect();
        const ty = (clientY - rect.top) * (300 / rect.height);
        p.y = Math.min(Math.max(25, ty), 275);
    }
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientY); }, { passive: false });
    canvas.onmousemove = e => handleMove(e.clientY);

    // ГЕЙМПЛЕЙ (ДО 5 ГОЛОВ)
    let p = { y: 150 }, b = { y: 150 }, puck = { x: 250, y: 150, vx: 4, vy: 2 }, score = { p: 0, b: 0 }, active = false;

    function startMatch() {
        document.getElementById('menu').style.display = 'none';
        score = { p: 0, b: 0 }; puck.x = 250; puck.vx = (Math.random() > 0.5 ? 4 : -4); active = true; loop();
    }

    function loop() {
        if(!active) return;
        puck.x += puck.vx; puck.y += puck.vy;
        if(puck.y < 8 || puck.y > 292) puck.vy *= -1;
        
        // AI Бот (Средний)
        let target = puck.y;
        if(b.y < target) b.y += 3.2; else b.y -= 3.2;

        // Физика отскоков
        if(puck.x < 25 && Math.abs(puck.y - p.y) < 30) puck.vx = Math.abs(puck.vx) + 0.3;
        if(puck.x > 475 && Math.abs(puck.y - b.y) < 30) puck.vx = -Math.abs(puck.vx) - 0.3;

        if(puck.x < 0) { score.b++; puck.x=250; puck.vx=4; }
        if(puck.x > 500) { score.p++; puck.x=250; puck.vx=-4; }
        document.getElementById('score').innerText = `${score.p} : ${score.b}`;

        ctx.clearRect(0,0,500,300);
        // Шайба
        ctx.fillStyle="#333"; ctx.beginPath(); ctx.arc(puck.x, puck.y, 8, 0, Math.PI*2); ctx.fill();
        // Игроки
        ctx.fillStyle="cyan"; ctx.fillRect(5, p.y-25, 10, 50);
        ctx.fillStyle="red"; ctx.fillRect(485, b.y-25, 10, 50);

        if(score.p >= 5 || score.b >= 5) {
            active = false;
            let win = score.p >= 5;
            if(win) { user.elo += 25; user.streak++; } else { user.elo = Math.max(0, user.elo-15); user.streak=0; }
            save();
            document.getElementById('mMsg').innerText = win ? "ПОБЕДА!" : "ПОРАЖЕНИЕ";
            document.getElementById('menu').style.display = 'flex';
        } else requestAnimationFrame(loop);
    }

    // ТИТУЛЫ
    function openTitles() {
        const grid = document.getElementById('titlesGrid'); grid.innerHTML = '';
        ALL_TITLES.forEach(t => {
            const isLocked = user.elo < t.req;
            const card = document.createElement('div');
            card.className = `title-card ${isLocked ? 'locked' : ''}`;
            card.innerHTML = `<span class="${t.class}">${t.name}</span><br><small>${t.req} ELO</small>`;
            if(!isLocked) card.onclick = () => { user.activeTitleId = t.id; save(); closeTitles(); };
            grid.appendChild(card);
        });
        document.getElementById('titles-screen').style.display = 'block';
    }
    function closeTitles() { document.getElementById('titles-screen').style.display = 'none'; }
    
    // ФОТО
    document.getElementById('f').onchange = e => {
        let r = new FileReader(); r.onload = () => { user.pfp = r.result; save(); }; r.readAsDataURL(e.target.files);
    };

    updateUI();
</script>
</body>
</html>

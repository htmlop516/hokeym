<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Три Кота: Хоккей ELO & UID</title>
    <style>
        :root {
            --gold: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            --pearl: linear-gradient(135deg, #fff, #e6d3f9, #c8f4f9, #f9d3e3, #fff);
            --accent: #ff4757;
        }
        body { 
            background: #0a0a12; color: white; font-family: 'Arial', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; 
        }
        
        /* ШАПКА И ПРОФИЛЬ */
        .header { background: #161625; padding: 15px; display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #252545; }
        .pfp-box { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--accent); overflow: hidden; cursor: pointer; flex-shrink: 0; }
        .pfp-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .user-info { flex-grow: 1; }
        .uid-tag { font-size: 10px; color: #777; margin-top: 5px; background: #000; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        
        /* ТИТУЛЫ */
        .title-badge { font-weight: 900; font-size: 12px; text-transform: uppercase; margin-top: 5px; }
        .gold-t { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s infinite linear; background-size: 200%; }
        .pearl-t { background: var(--pearl); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s infinite linear; background-size: 200%; filter: drop-shadow(0 0 5px #fff); }
        @keyframes shine { to { background-position: 200% center; } }

        /* ИГРОВАЯ ЗОНА */
        .game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #1a1a2e 0%, #0a0a12 100%); }
        #score { font-size: 40px; font-weight: 900; margin-bottom: 10px; letter-spacing: 5px; }
        canvas { background: #fff; border-radius: 15px; max-width: 95%; height: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        /* BATTLE PASS */
        .bp-zone { background: #161625; padding: 15px; border-top: 2px solid #252545; }
        .bp-track { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .bp-item { min-width: 80px; height: 100px; background: #1f1f35; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; border: 1px solid #333; }
        .bp-item.unlocked { border-color: #44ffaa; background: #253535; }

        /* МЕНЮ */
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .play-btn { padding: 15px 50px; font-size: 20px; background: var(--accent); border: none; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="pfp-box" onclick="document.getElementById('fileIn').click()">
            <img src="https://i.imgur.com" id="pfpImg">
        </div>
        <input type="file" id="fileIn" hidden accept="image/*">
        
        <div class="user-info">
            <input type="text" id="nameIn" placeholder="Ник..." oninput="syncName()" style="background:#000; border:1px solid #333; color:white; padding:5px; border-radius:5px;">
            <h3 id="nameShow" style="margin:5px 0;">Игрок_Кот</h3>
            <div id="titleShow" class="title-badge gold-t">ЗОЛОТОЙ МАСТЕР</div>
            <br>
            <div class="uid-tag">UID: <span id="uidShow">000000</span></div>
        </div>

        <div style="text-align:right;">
            <div style="color:#44ffaa; font-size:28px; font-weight:bold;" id="eloShow">1000</div>
            <div style="font-size:12px; color:orange;">СЕРИЯ: <span id="streakShow">0</span> 🔥</div>
        </div>
    </div>

    <div class="game-area">
        <div id="score">0 : 0</div>
        <canvas id="hockeyCanvas" width="600" height="350"></canvas>
        
        <div id="menu">
            <h1 id="mMsg">ГОТОВ К МАТЧУ?</h1>
            <select id="botDiff" style="padding:10px; margin-bottom:20px; border-radius:10px; background:#1f1f35; color:white;">
                <option value="2">Бот: Новичок (+20 ELO)</option>
                <option value="4.5">Бот: Профи (+40 ELO)</option>
                <option value="8">Бот: ЛЕГЕНДА (+80 ELO)</option>
            </select>
            <button class="play-btn" onclick="startMatch()">ИГРАТЬ</button>
        </div>
    </div>

    <div class="bp-zone">
        <div style="font-size:14px; margin-bottom:10px;">Battle Pass: Уровень <span id="bpLvl">1</span></div>
        <div class="bp-track" id="bpTrack"></div>
    </div>

<script>
    const canvas = document.getElementById('hockeyCanvas');
    const ctx = canvas.getContext('2d');
    
    // ДАННЫЕ И СОХРАНЕНИЕ
    let user = JSON.parse(localStorage.getItem('cat_hockey_save')) || {
        elo: 1000, streak: 0, bp: 1, 
        name: "Игрок_Кот", 
        pfp: "https://i.imgur.com",
        uid: Math.floor(100000 + Math.random() * 900000)
    };

    function save() { localStorage.setItem('cat_hockey_save', JSON.stringify(user)); updateUI(); }

    // ИГРОВЫЕ ОБЪЕКТЫ
    let p = { y: 175, r: 25, c: '#00d2ff' };
    let b = { y: 175, r: 25, c: '#ff4757', s: 3 };
    let puck = { x: 300, y: 175, vx: 0, vy: 0, r: 12 };
    let score = { p: 0, b: 0 }, active = false;

    // УПРАВЛЕНИЕ (МЫШЬ + ТАЧ)
    function handleMove(clientY) {
        let rect = canvas.getBoundingClientRect();
        let ty = (clientY - rect.top) * (350 / rect.height);
        p.y = Math.min(Math.max(p.r, ty), 350 - p.r);
    }
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientY); }, {passive: false});
    canvas.onmousemove = e => handleMove(e.clientY);

    // ФОТО И НИК
    document.getElementById('fileIn').onchange = e => {
        let r = new FileReader();
        r.onload = () => { user.pfp = r.result; save(); };
        r.readAsDataURL(e.target.files[0]);
    };
    function syncName() { user.name = document.getElementById('nameIn').value || "Игрок_Кот"; save(); }

    function startMatch() {
        document.getElementById('menu').style.display = 'none';
        b.s = parseFloat(document.getElementById('botDiff').value);
        score = { p: 0, b: 0 }; resetPuck(); active = true; loop();
    }

    function resetPuck() {
        puck.x = 300; puck.y = 175;
        puck.vx = (Math.random() > 0.5 ? 5 : -5);
        puck.vy = (Math.random() - 0.5) * 8;
    }

    function loop() {
        if(!active) return;
        puck.x += puck.vx; puck.y += puck.vy;
        if(puck.y < puck.r || puck.y > 350 - puck.r) puck.vy *= -1;

        // Бот
        if(b.y < puck.y) b.y += b.s; else b.y -= b.s;

        // Коллизии
        if(puck.x < 40 && Math.abs(puck.y - p.y) < 35) puck.vx = Math.abs(puck.vx) + 0.5;
        if(puck.x > 560 && Math.abs(puck.y - b.y) < 35) puck.vx = -Math.abs(puck.vx) - 0.5;

        if(puck.x < 0) { score.b++; resetPuck(); }
        if(puck.x > 600) { score.p++; resetPuck(); }
        document.getElementById('score').innerText = `${score.p} : ${score.b}`;

        // Отрисовка
        ctx.clearRect(0,0,600,350);
        ctx.fillStyle="#333"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle=p.c; ctx.fillRect(10, p.y-30, 15, 60);
        ctx.fillStyle=b.c; ctx.fillRect(575, b.y-30, 15, 60);

        if(score.p >= 5 || score.b >= 5) {
            active = false;
            finishMatch(score.p >= 5);
        } else requestAnimationFrame(loop);
    }

    function finishMatch(win) {
        if(win) {
            let gain = Math.floor(b.s * 10);
            user.elo += gain; user.streak++;
            document.getElementById('mMsg').innerText = "ПОБЕДА! +" + gain;
        } else {
            user.elo = Math.max(0, user.elo - 20); user.streak = 0;
            document.getElementById('mMsg').innerText = "ПОРАЖЕНИЕ!";
        }
        save();
        document.getElementById('menu').style.display = 'flex';
    }

    function updateUI() {
        document.getElementById('eloShow').innerText = user.elo;
        document.getElementById('streakShow').innerText = user.streak;
        document.getElementById('uidShow').innerText = user.uid;
        document.getElementById('nameShow').innerText = user.name;
        document.getElementById('pfpImg').src = user.pfp;
        
        const t = document.getElementById('titleShow');
        if(user.elo > 1300) { t.innerText = "ПЕРЛАМУТРОВЫЙ БОГ"; t.className = "title-badge pearl-t"; }
        else if(user.elo > 1100) { t.innerText = "ЗОЛОТОЙ МАСТЕР"; t.className = "title-badge gold-t"; }
        else { t.innerText = "НОВИЧОК"; t.className = "title-badge"; t.style.color = "#aaa"; }

        user.bp = Math.floor((user.elo - 1000) / 40) + 1;
        document.getElementById('bpLvl').innerText = user.bp > 0 ? user.bp : 1;
        
        const track = document.getElementById('bpTrack'); track.innerHTML = '';
        for(let i=1; i<=15; i++) {
            let item = document.createElement('div');
            item.className = `bp-item ${i <= user.bp ? 'unlocked' : ''}`;
            item.innerHTML = `<div>Ур. ${i}</div><div style="font-size:20px">${i === 15 ? '💎' : '🎁'}</div>`;
            track.appendChild(item);
        }
    }

    updateUI();
</script>
</body>
</html>
